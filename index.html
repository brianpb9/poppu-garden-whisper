/* ---------------------------------------------------------------------------
   4. AUDIO ENGINE — mic capture + RMS + Web Audio synthesis
   ------------------------------------------------------------------------- */
const Audio = {
  ctx: null, analyser: null, data: null, stream: null,
  micReady: false, micDenied: false,
  rms: 0, db: -100, smoothDb: -100, level: 'SILENT', levelIdx: 0,
  master: null, musicGain: null, noiseBuffer: null,
  riverNode: null, currentTheme: null,

  async init(){
    if(this.ctx) return;
    try {
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
    } catch(e){
      console.warn('AudioContext not available — running in silent mode');
      this.ctx = null; return;
    }
    this.master = this.ctx.createGain(); this.master.gain.value=0.9; this.master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value=0.0; this.musicGain.connect(this.master);
    // noise buffer for percussive/water sounds
    const n=this.ctx.sampleRate*2; const buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate); const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1; this.noiseBuffer=buf;
  },

  async requestMic(){
    await this.init();
    if(!this.ctx){ this.micDenied=true; this.micReady=false; return false; } // silent mode: no audio available
    if(this.ctx.state==='suspended') await this.ctx.resume();
    try{
      this.stream = await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }});
      const src=this.ctx.createMediaStreamSource(this.stream);
      this.analyser=this.ctx.createAnalyser(); this.analyser.fftSize=1024; this.analyser.smoothingTimeConstant=0.4;
      this.data=new Float32Array(this.analyser.fftSize);
      src.connect(this.analyser);
      this.micReady=true; this.micDenied=false;
      return true;
    }catch(e){ this.micDenied=true; this.micReady=false; return false; }
  },

  // Called each frame. Returns smoothed dB. Falls back to gentle auto-breathe if mic denied.
  update(dt, t){
    if(this.micReady && this.analyser){
      this.analyser.getFloatTimeDomainData(this.data);
      let sum=0; for(let i=0;i<this.data.length;i++){ const v=this.data[i]; sum+=v*v; }
      this.rms=Math.sqrt(sum/this.data.length);
      this.db = this.rms>1e-7 ? 20*Math.log10(this.rms) : -100;
    } else {
      // Fallback "auto garden breathing" so denied-mic users still see magic
      const breathe = (Math.sin(t*0.6)+1)/2; // 0..1
      this.db = lerp(-60, -20, breathe*breathe);
    }
    // asymmetric smoothing: rise fast, fall slow (feels responsive + gentle)
    const rate = this.db>this.smoothDb ? 18 : 4;
    this.smoothDb = smooth(this.smoothDb, this.db, rate, dt);
    // classify
    let lv='SILENT';
    for(const k of SOUND_ORDER){ const s=SOUND[k]; if(this.smoothDb>=s.min && this.smoothDb<s.max){ lv=k; break; } }
    this.level=lv; this.levelIdx=SOUND[lv].i;
    return this.smoothDb;
  },
  // normalized loudness 0..1 across the audible band for driving visuals
  norm(){ return clamp((this.smoothDb+55)/50, 0, 1); },

  // ---- SFX synthesis ----
  now(){ return this.ctx? this.ctx.currentTime : 0; },
  env(node, t0, a, hold, d, peak){ const g=node.gain; g.cancelScheduledValues(t0); g.setValueAtTime(0.0001,t0);
    g.exponentialRampToValueAtTime(peak,t0+a); g.setValueAtTime(peak,t0+a+hold); g.exponentialRampToValueAtTime(0.0001,t0+a+hold+d); },

  tone(freq, t0, dur, type='sine', peak=0.2, dest=null){
    if(!this.ctx) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t0);
    o.connect(g); g.connect(dest||this.master);
    this.env(g,t0,0.012,dur*0.2,dur*0.8,peak);
    o.start(t0); o.stop(t0+dur+0.05);
    return {o,g};
  },
  bloomChime(){ if(!this.ctx)return; const t0=this.now();
    // 3 arpeggio variants so repeated blooms feel musical, not looped
    const sets=[[523.25,659.25,783.99,1046.5],[587.33,739.99,880.0,1174.7],[493.88,659.25,830.61,987.77]];
    const notes=pick(sets); notes.forEach((f,i)=> this.tone(f, t0+i*0.06, 0.5, 'sine', 0.14)); },
  sparkleVary(){ if(!this.ctx)return; const t0=this.now(); const s=this.ctx.createBufferSource(); s.buffer=this.noiseBuffer;
    const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=pick([5000,6500,8000]); bp.Q.value=8;
    const g=this.ctx.createGain(); s.connect(bp); bp.connect(g); g.connect(this.master);
    this.env(g,t0,0.005,0.01,0.09,0.11); s.start(t0); s.stop(t0+0.14);
    this.tone(pick([880,1046.5,1318.5]), t0, 0.25, 'sine', 0.05); },
  chirp(){ if(!this.ctx)return; const t0=this.now();
    [0,0.09,0.18].forEach((d,i)=>{ const o=this.ctx.createOscillator(),g=this.ctx.createGain(),m=this.ctx.createOscillator(),mg=this.ctx.createGain();
      o.type='sine'; m.type='sine'; m.frequency.value=24; mg.gain.value=120; m.connect(mg); mg.connect(o.frequency);
      const base=700+i*220; o.frequency.setValueAtTime(base,t0+d); o.frequency.exponentialRampToValueAtTime(base*1.4,t0+d+0.08);
      o.connect(g); g.connect(this.master); this.env(g,t0+d,0.006,0.02,0.1,0.09); m.start(t0+d); o.start(t0+d); o.stop(t0+d+0.16); m.stop(t0+d+0.16); }); },
  grabChime(){ if(!this.ctx)return; const t0=this.now(); this.tone(1174.7,t0,0.3,'sine',0.09); this.tone(1567.98,t0+0.02,0.34,'sine',0.05); },
  shakeChime(){ if(!this.ctx)return; const t0=this.now();
    for(let k=0;k<5;k++){ const s=this.ctx.createBufferSource(); s.buffer=this.noiseBuffer;
      const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=3000+k*400; bp.Q.value=6;
      const g=this.ctx.createGain(); s.connect(bp); bp.connect(g); g.connect(this.master);
      this.env(g,t0+k*0.04,0.003,0.004,0.03,0.07); s.start(t0+k*0.04); s.stop(t0+k*0.04+0.06); }
    [659.25,830.6,1046.5].forEach((f,i)=> this.tone(f,t0+0.1+i*0.05,0.5,'sine',0.09)); },
  startDragChime(){ if(!this.ctx||this.dragNode) return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine'; o.frequency.value=1046.5;
    const lfo=this.ctx.createOscillator(),lg=this.ctx.createGain(); lfo.frequency.value=6; lg.gain.value=8; lfo.connect(lg); lg.connect(o.frequency);
    const trem=this.ctx.createOscillator(),tg=this.ctx.createGain(); trem.frequency.value=4; tg.gain.value=0.02; trem.connect(tg); tg.connect(g.gain);
    g.gain.value=0.0; o.connect(g); g.connect(this.master); o.start(); lfo.start(); trem.start();
    g.gain.setTargetAtTime(0.04, this.now(), 0.1); this.dragNode={o,g,lfo,trem}; },
  stopDragChime(){ if(!this.dragNode) return; const n=this.dragNode; this.dragNode=null; const t=this.now();
    n.g.gain.setTargetAtTime(0.0001,t,0.15); setTimeout(()=>{ try{n.o.stop();n.lfo.stop();n.trem.stop();}catch(e){} }, 400); },
  sparkle(){ if(!this.ctx)return; const t0=this.now(); const s=this.ctx.createBufferSource(); s.buffer=this.noiseBuffer;
    const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=6000; bp.Q.value=8;
    const g=this.ctx.createGain(); s.connect(bp); bp.connect(g); g.connect(this.master);
    this.env(g,t0,0.005,0.01,0.09,0.12); s.start(t0); s.stop(t0+0.14); },
  splash(){ if(!this.ctx)return; const t0=this.now(); const s=this.ctx.createBufferSource(); s.buffer=this.noiseBuffer;
    const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(1800,t0); lp.frequency.exponentialRampToValueAtTime(300,t0+0.3);
    const g=this.ctx.createGain(); s.connect(lp); lp.connect(g); g.connect(this.master);
    this.env(g,t0,0.005,0.02,0.3,0.16); s.start(t0); s.stop(t0+0.4); },
  birds(){ if(!this.ctx)return; const t0=this.now();
    for(let k=0;k<2;k++){ const o=this.ctx.createOscillator(), g=this.ctx.createGain(), m=this.ctx.createOscillator(), mg=this.ctx.createGain();
      o.type='sine'; m.type='sine'; m.frequency.value=18; mg.gain.value=200; m.connect(mg); mg.connect(o.frequency);
      const base=1400+k*300; o.frequency.setValueAtTime(base,t0+k*0.18); o.frequency.exponentialRampToValueAtTime(base*1.5,t0+k*0.18+0.12);
      o.connect(g); g.connect(this.master); this.env(g,t0+k*0.18,0.01,0.02,0.14,0.07); m.start(t0+k*0.18); o.start(t0+k*0.18); o.stop(t0+k*0.18+0.2); m.stop(t0+k*0.18+0.2); } },
  rainbowMagic(){ if(!this.ctx)return; const t0=this.now(); [523.25,659.25,783.99,987.77,1318.5].forEach((f,i)=>{
      const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='triangle'; o.frequency.value=f;
      o.connect(g); g.connect(this.master); this.env(g,t0+i*0.04,0.008,0.05,0.9,0.10); o.start(t0+i*0.04); o.stop(t0+i*0.04+1.1); }); },
  golden(){ if(!this.ctx)return; const t0=this.now(); [659.25,830.6,987.77,1318.5,1661.2].forEach((f,i)=>{
      const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='sine'; o.frequency.value=f;
      const o2=this.ctx.createOscillator(); o2.type='sine'; o2.frequency.value=f*2.01; const g2=this.ctx.createGain(); g2.gain.value=0.3; o2.connect(g2); g2.connect(g);
      o.connect(g); g.connect(this.master); this.env(g,t0+i*0.08,0.01,0.1,1.2,0.12); o.start(t0+i*0.08); o2.start(t0+i*0.08); o.stop(t0+i*0.08+1.4); o2.stop(t0+i*0.08+1.4); }); },

  startRiver(){ if(!this.ctx||this.riverNode) return; const s=this.ctx.createBufferSource(); s.buffer=this.noiseBuffer; s.loop=true;
    const bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=800; bp.Q.value=0.6;
    const g=this.ctx.createGain(); g.gain.value=0.0; const lfo=this.ctx.createOscillator(), lg=this.ctx.createGain();
    lfo.frequency.value=0.3; lg.gain.value=200; lfo.connect(lg); lg.connect(bp.frequency);
    s.connect(bp); bp.connect(g); g.connect(this.master); s.start(); lfo.start(); this.riverNode={g}; },
  setRiver(v){ if(this.riverNode) this.riverNode.g.gain.setTargetAtTime(v*0.06, this.now(), 0.3); },

  // ---- Ambient music: kalimba (day) / music box (night) pentatonic loops ----
  musicStep:0, musicTimer:0, musicMode:'day',
  updateMusic(dt){
    if(!this.ctx) return;
    this.musicTimer-=dt;
    if(this.musicTimer<=0){
      const day = this.musicMode==='day';
      this.musicTimer = day? 0.36 : 0.62; // ~100bpm vs ~70bpm feel
      this.musicStep=(this.musicStep+1)%64;
      const scale = day? [523.25,587.33,659.25,783.99,880.0] : [523.25,659.25,783.99,1046.5,1174.7];
      if(Math.random()<(day?0.85:0.6)){
        const f=pick(scale)*(Math.random()<0.2?0.5:1);
        const o=this.ctx.createOscillator(), g=this.ctx.createGain();
        o.type= day?'triangle':'sine'; o.frequency.value=f;
        o.connect(g); g.connect(this.musicGain);
        const t0=this.now(); g.gain.setValueAtTime(0.0001,t0);
        g.gain.exponentialRampToValueAtTime(day?0.18:0.14,t0+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,t0+(day?0.9:1.6));
        o.start(t0); o.stop(t0+(day?1.0:1.7));
      }
      // day: soft warm bass note every 4 beats (grounds the kalimba)
      if(day && this.musicStep%4===0){
        const bf=pick([130.81,146.83,164.81,196.0]); const o=this.ctx.createOscillator(), g=this.ctx.createGain();
        o.type='sine'; o.frequency.value=bf; o.connect(g); g.connect(this.musicGain);
        const t0=this.now(); g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.12,t0+0.04);
        g.gain.exponentialRampToValueAtTime(0.0001,t0+1.4); o.start(t0); o.stop(t0+1.5);
      }
      // night: gentle bell overlay every 8 beats (music-box shimmer)
      if(!day && this.musicStep%8===0){
        const f=pick([1046.5,1318.5,1567.98]); const o=this.ctx.createOscillator(), g=this.ctx.createGain();
        const o2=this.ctx.createOscillator(), g2=this.ctx.createGain(); g2.gain.value=0.3;
        o.type='sine'; o.frequency.value=f; o2.type='sine'; o2.frequency.value=f*2.01; o2.connect(g2); g2.connect(g);
        o.connect(g); g.connect(this.musicGain); const t0=this.now();
        g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.09,t0+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,t0+2.2); o.start(t0); o2.start(t0); o.stop(t0+2.3); o2.stop(t0+2.3);
      }
    }
  },
  setMusicMode(mode){ this.musicMode=mode; },
  setMusicVol(v){ if(this.musicGain) this.musicGain.gain.setTargetAtTime(v, this.now(), 0.8); },

  // ---- Environmental ambience: layered wind / crickets / waves / birdsong ----
  ambience:{ scene:null, windGain:null, waveGain:null, waveLFOgain:null, cricketT:0, owlT:0, birdT:0 },
  _ambInit:false,
  initAmbience(){
    if(!this.ctx || this._ambInit) return; this._ambInit=true; const A=this.ambience;
    // Layer 1 — gentle wind (always on, very quiet)
    const s=this.ctx.createBufferSource(); s.buffer=this.noiseBuffer; s.loop=true;
    const lp=this.ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520;
    const g=this.ctx.createGain(); g.gain.value=0.0;
    const lfo=this.ctx.createOscillator(),lg=this.ctx.createGain(); lfo.frequency.value=0.08; lg.gain.value=0.006; lfo.connect(lg); lg.connect(g.gain);
    s.connect(lp); lp.connect(g); g.connect(this.master); s.start(); lfo.start(); A.windGain=g;
    // Layer 3 — ocean wave wash (filtered noise + slow swell LFO)
    const s2=this.ctx.createBufferSource(); s2.buffer=this.noiseBuffer; s2.loop=true;
    const lp2=this.ctx.createBiquadFilter(); lp2.type='lowpass'; lp2.frequency.value=380;
    const g2=this.ctx.createGain(); g2.gain.value=0.0;
    const lfo2=this.ctx.createOscillator(),lg2=this.ctx.createGain(); lfo2.frequency.value=0.14; lg2.gain.value=0.0; lfo2.connect(lg2); lg2.connect(g2.gain);
    s2.connect(lp2); lp2.connect(g2); g2.connect(this.master); s2.start(); lfo2.start();
    A.waveGain=g2; A.waveLFOgain=lg2;
  },
  setAmbience(scene){
    this.initAmbience(); if(!this.ctx) return; const t=this.now(); const A=this.ambience; A.scene=scene;
    if(A.windGain)    A.windGain.gain.setTargetAtTime(0.012, t, 0.6);                    // wind everywhere
    if(A.waveGain)    A.waveGain.gain.setTargetAtTime(scene==='ocean'?0.05:0.0, t, 0.9); // waves in ocean
    if(A.waveLFOgain) A.waveLFOgain.gain.setTargetAtTime(scene==='ocean'?0.04:0.0, t, 0.9);
    A.cricketT=rand(0.5,1.5); A.owlT=rand(5,9); A.birdT=rand(1.5,3.5);
  },
  updateAmbience(dt){
    if(!this.ctx) return; const A=this.ambience; if(!A.scene) return;
    if(A.scene==='forest'){
      A.cricketT-=dt; if(A.cricketT<=0){ A.cricketT=rand(0.5,1.6); this.cricket(); }
      A.owlT-=dt;     if(A.owlT<=0){ A.owlT=rand(7,15); this.owl(); }
    } else if(A.scene==='backyard'){
      A.birdT-=dt; if(A.birdT<=0){ A.birdT=rand(3,7); this.birds(); }
    }
  },
  cricket(){ if(!this.ctx)return; const t0=this.now(); for(let k=0;k<3;k++){ const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='square'; o.frequency.value=4200+rand(-200,200); o.connect(g); g.connect(this.master);
    this.env(g,t0+k*0.06,0.004,0.005,0.03,0.018); o.start(t0+k*0.06); o.stop(t0+k*0.06+0.07); } },
  owl(){ if(!this.ctx)return; const t0=this.now(); [0,0.55].forEach(d=>{ const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(340,t0+d); o.frequency.exponentialRampToValueAtTime(300,t0+d+0.25);
    o.connect(g); g.connect(this.master); this.env(g,t0+d,0.03,0.08,0.2,0.045); o.start(t0+d); o.stop(t0+d+0.42); }); },
};

/* ---------------------------------------------------------------------------
   5. PARTICLE SYSTEMS (pollen, confetti, water) — procedural is allowed
   ------------------------------------------------------------------------- */
class Particles {
  constructor(max){ this.max=max; this.pool=[]; for(let i=0;i<max;i++) this.pool.push({active:false}); }
  spawn(cfg){ for(const p of this.pool){ if(!p.active){ Object.assign(p,cfg,{active:true}); return p; } } }
  update(dt){ for(const p of this.pool){ if(!p.active) continue; p.life-=dt; if(p.life<=0){p.active=false;continue;}
    p.vy+=(p.g||0)*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.rot=(p.rot||0)+(p.vr||0)*dt; } }
}

/* ---------------------------------------------------------------------------
   6. ENTITIES
   ------------------------------------------------------------------------- */
class Flower {
  constructor(type,x,y,scale){ this.type=type; this.x=x; this.y=y; this.scale=scale; this.stageF=0; this.target=0;
    this.sway=Math.random()*TAU; this.discovered=false; this.pop=0; this.golden=false; this.tapCd=0; this.wiggle=0; }
  update(dt, norm, sway){
    // target bloom stage 0..3 from loudness, with slight per-flower variance
    this.target = norm*3;
    this.stageF = smooth(this.stageF, this.target, this.stageF<this.target?5:2.2, dt);
    this.sway += dt;
    this.pop = Math.max(0, this.pop-dt*3);
    this.tapCd = Math.max(0, this.tapCd-dt);
    this.wiggle = Math.max(0, this.wiggle-dt*3);
  }
  stageName(){ const s=Math.round(this.stageF); return ['seed','sprout','bud','bloom'][clamp(s,0,3)]; }
  isBloom(){ return this.stageF>2.5; }
  draw(g, swayAmp){
    const img=Assets.get(`${this.type}-${this.stageName()}`); if(!img) return;
    const sc=this.scale*(1+this.pop*0.18);
    const w=img.width*sc, h=img.height*sc;
    const wobble=Math.sin(this.sway*1.4)*swayAmp*8*(0.4+this.stageF*0.2);
    g.save(); g.translate(this.x+wobble, this.y);
    if(this.wiggle>0) g.rotate(Math.sin(this.wiggle*30)*0.14*this.wiggle); // tap wiggle from the base
    if(this.golden){ g.shadowColor='rgba(255,215,110,0.9)'; g.shadowBlur=40; }
    g.drawImage(img,-w/2,-h, w,h);
    g.restore();
  }
}
class Butterfly {
  constructor(x,y){ this.type=pick(BUTTERFLIES); this.x=x; this.y=y; this.vx=rand(-40,40); this.vy=rand(-30,-10);
    this.t=Math.random()*TAU; this.scale=rand(0.5,0.85); this.life=rand(8,16); this.flap=0;
    this.grabbed=false; this.glow=0; }
  update(dt){
    this.flap+=dt*(this.grabbed?26:18);
    this.glow=this.grabbed ? Math.min(1,this.glow+dt*4) : Math.max(0,this.glow-dt*2);
    if(this.grabbed){ this.t+=dt*3; return; }   // held by finger: position set externally, no drift/aging
    this.t+=dt*rand(1.5,2.4); this.life-=dt;
    this.vx += Math.cos(this.t)*30*dt; this.vy += (Math.sin(this.t*1.3)*24 - 6)*dt;
    this.vx=clamp(this.vx,-70,70); this.vy=clamp(this.vy,-60,40);
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    if(this.x<-60)this.x=STAGE_W+40; if(this.x>STAGE_W+60)this.x=-40; if(this.y<40)this.vy+=20*dt; }
  draw(g){ const img=Assets.get(this.type); if(!img) return; const flap=0.6+Math.abs(Math.sin(this.flap))*0.5;
    const held=this.grabbed||this.glow>0.01;
    g.save(); g.translate(this.x,this.y);
    if(held){ g.shadowColor='rgba(255,240,170,'+(0.9*this.glow)+')'; g.shadowBlur=30*this.glow; }
    const sc=this.scale*(this.grabbed?1.18:1);
    g.scale(sc*(this.vx<0?-1:1)*flap, sc);
    g.globalAlpha=clamp(this.life,0,1); g.drawImage(img,-img.width/2,-img.height/2); g.restore(); g.globalAlpha=1; }
}
class Cloud {
  constructor(){ this.reset(true); }
  reset(init){ this.y=rand(60,STAGE_H*0.32); this.scale=rand(0.6,1.3); this.speed=rand(6,16); this.x=init?rand(0,STAGE_W):-300; }
  update(dt){ this.x+=this.speed*dt; if(this.x>STAGE_W+300) this.reset(false); }
  draw(g,alpha){ const img=Assets.get('cloud-fluffy'); if(!img)return; g.save(); g.globalAlpha=alpha*0.9;
    g.translate(this.x,this.y); g.scale(this.scale,this.scale); g.drawImage(img,-img.width/2,-img.height/2); g.restore(); g.globalAlpha=1; }
}

/* ---------------------------------------------------------------------------
   7. GAME — scenes, state machine, loop
   ------------------------------------------------------------------------- */
const Game = {
  canvas:null, g:null, dpr:1, scale:1, ox:0, oy:0,
  mode:'loading',            // loading | start | playing
  sceneKey:'backyard',
  gardenState: GS.SLEEPING, stateT:0,
  wake:0,                    // 0 sleeping .. 1 fully awake (drives day/night blend)
  silenceTimer:0,
  flowers:[], butterflies:[], clouds:[],
  pollen:null, confetti:null, water:null,
  rainbow:0, screamCooldown:0, screamPhase:0,
  goldenTimer:60, goldenActive:0,
  time:0, last:0,
  bloomedThisSession:new Set(),
  ui:{ toast:null, toastT:0, stickerPop:0, showBook:false, showParent:false, sceneMenuPulse:0 },
  poppuPose:'sleep', poppuBounce:0,
  poppuBlinkT:3, poppuBlinkDur:0, poppuForceT:0,
  showHint:false, hintT:0,
  celebrateT:0, celebrateFlower:null,
  pointer:{x:0,y:0,down:false},
  press:null, poppuWave:0, poppuWaveCd:0,
  shakeWave:0, shakeCd:0, decor:[],
  playSessionStart:0,

  async boot(){
    this.canvas=document.getElementById('game'); this.g=this.canvas.getContext('2d');
    Save.load();
    this.resize(); window.addEventListener('resize',()=>this.resize());
    this.bindInput();
    this.bindLifecycle();
    this.bindMotion();
    const bootStart=performance.now();
    const fill=document.getElementById('loadFill'), count=document.getElementById('loadCount');
    await Assets.loadAll((d,t)=>{
      const pct=Math.round(d/t*100);
      if(fill) fill.style.width=pct+'%';
      if(count) count.textContent=d+'/'+t+' 🌸';
    });
    if(fill) fill.style.width='100%';
    // premium feel: hold the loading screen a minimum 1.5s even on fast loads
    const elapsed=performance.now()-bootStart;
    if(elapsed<1500) await new Promise(r=>setTimeout(r,1500-elapsed));
    document.getElementById('loader').classList.add('hidden');
    this.pollen=new Particles(160); this.confetti=new Particles(200); this.water=new Particles(80);
    this.clouds=[]; for(let i=0;i<5;i++) this.clouds.push(new Cloud());
    this.mode='start';
    this.last=performance.now();
    requestAnimationFrame(t=>this.frame(t));
  },

  resize(){
    const w=window.innerWidth, h=window.innerHeight; this.dpr=Math.min(window.devicePixelRatio||1, 2);
    this.canvas.width=w*this.dpr; this.canvas.height=h*this.dpr; this.canvas.style.width=w+'px'; this.canvas.style.height=h+'px';
    this.scale=Math.max(w/STAGE_W, h/STAGE_H); // cover
    this.ox=(w-STAGE_W*this.scale)/2; this.oy=(h-STAGE_H*this.scale)/2;
  },
  toStage(cx,cy){ return { x:(cx-this.ox)/this.scale, y:(cy-this.oy)/this.scale }; },

  bindInput(){
    const down=e=>{ const p=this.evPos(e); this.pointer.down=true; this.pointer.x=p.x; this.pointer.y=p.y; this.onPressDown(p.x,p.y); };
    const move=e=>{ const p=this.evPos(e); this.pointer.x=p.x; this.pointer.y=p.y; this.onPressMove(p.x,p.y); };
    const up=e=>{ if(e && (e.clientX!==undefined)){ const p=this.evPos(e); this.pointer.x=p.x; this.pointer.y=p.y; } this.pointer.down=false; this.onPressUp(this.pointer.x,this.pointer.y); };
    this.canvas.addEventListener('mousedown',down); this.canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    this.canvas.addEventListener('touchstart',e=>{ e.preventDefault(); down(e.changedTouches[0]); },{passive:false});
    this.canvas.addEventListener('touchmove',e=>{ e.preventDefault(); move(e.changedTouches[0]); },{passive:false});
    this.canvas.addEventListener('touchend',e=>{ e.preventDefault(); up(e.changedTouches[0]); },{passive:false});
  },
  evPos(e){ const r=this.canvas.getBoundingClientRect(); return this.toStage((e.clientX-r.left), (e.clientY-r.top)); },

  // ---- DeviceMotion: shake to pollinate ----
  bindMotion(){
    this.shakeCd=0; this._lastAcc=null;
    window.addEventListener('devicemotion', e=>{
      const a=e.accelerationIncludingGravity||e.acceleration; if(!a) return;
      if(this._lastAcc){ const dx=(a.x||0)-this._lastAcc.x, dy=(a.y||0)-this._lastAcc.y, dz=(a.z||0)-this._lastAcc.z;
        const delta=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(delta>18 && this.shakeCd<=0 && this.mode==='playing'){ this.triggerShake(); this.shakeCd=2; }
      }
      this._lastAcc={x:a.x||0,y:a.y||0,z:a.z||0};
    });
  },
  requestMotionPerm(){
    try{ if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
      DeviceMotionEvent.requestPermission().catch(()=>{}); } }catch(e){}
  },

  // Pause mic + audio when tab is hidden (release the mic, stop the leak); resume cleanly when visible.
  bindLifecycle(){
    document.addEventListener('visibilitychange', ()=>{
      if(document.hidden){
        if(Audio.stream){ Audio.stream.getTracks().forEach(t=>t.stop()); Audio.stream=null; Audio.analyser=null; Audio.micReady=false; }
        if(Audio.ctx && Audio.ctx.state==='running') Audio.ctx.suspend();
      } else {
        if(Audio.ctx && Audio.ctx.state==='suspended') Audio.ctx.resume();
        // re-acquire the mic (permission already granted) so the garden keeps listening
        if(this.mode==='playing' && !Audio.micDenied && !Audio.stream && !this._micPending){
          this._micPending=true;
          Promise.resolve(Audio.requestMic()).finally(()=>{ this._micPending=false; });
        }
      }
    });
  },

  buildScene(key){
    this.sceneKey=key; const sc=SCENES[key];
    this.flowers=[]; const list=sc.flowers; const n=list.length;
    // 3 depth rows of 6; front rows sit lower + larger for a natural, dense bed.
    const perRow=6, rows=Math.ceil(n/perRow);
    const spread=STAGE_W*0.88, startX=STAGE_W*0.06;
    for(let i=0;i<n;i++){
      const row=(i/perRow)|0, col=i%perRow;
      // stagger every other row half a cell so flowers nest instead of lining up
      const stagger=(row%2)? (spread/(perRow-1))*0.5 : 0;
      const y=STAGE_H*0.80 + row*72 + rand(-14,14);
      let x=startX + (spread/(perRow-1))*col + stagger + rand(-30,30);
      x=clamp(x, STAGE_W*0.04, STAGE_W*0.96);
      const depth=row/Math.max(1,rows-1);           // 0 back .. 1 front
      const scale=lerp(0.58,0.90,depth) * rand(0.92,1.08);
      this.flowers.push(new Flower(list[i], x, y, scale));
    }
    // decorative static objects (rocks / mushrooms / shells / starfish)
    this.decor=(sc.decor||[]).map(d=>({ key:d.key, x:d.x*STAGE_W, y:d.y*STAGE_H, s:d.s }));
    // sort back-to-front
    this.flowers.sort((a,b)=>a.y-b.y);
    this.butterflies=[]; this.rainbow=0;
    Audio.startRiver();
    Audio.setAmbience(key);
  },

  startPlaying(){
    this.mode='playing'; this.buildScene(this.sceneKey);
    this.gardenState=GS.SLEEPING; this.wake=0; this.silenceTimer=0;
    Save.checkStreak();
    Save.rollPeriods();
    Save.data.sessions++; Save.save();
    this.playSessionStart=this.time; this._playAccum=0;
    // first-ever session: float a "Make a sound!" hint until they bloom or 8s passes
    if(!Save.data.onboarded && Save.data.bloomedTotal===0){ this.showHint=true; this.hintT=8; }
  },
  dismissHint(){
    if(!this.showHint) return;
    this.showHint=false;
    if(!Save.data.onboarded){ Save.data.onboarded=true; Save.save(); }
  },

  frame(now){
    let dt=(now-this.last)/1000; this.last=now; if(dt>0.05)dt=0.05; this.time+=dt;
    if(this.mode==='playing'){ Audio.update(dt, this.time); Audio.updateMusic(dt); Audio.updateAmbience(dt); this.updatePlay(dt); }
    else { Audio.updateMusic(dt); }
    this.render(dt);
    requestAnimationFrame(t=>this.frame(t));
  },

  /* ---------------- update ---------------- */
  updatePlay(dt){
    const norm=Audio.norm(), lvl=Audio.level, li=Audio.levelIdx;
    // --- state machine ---
    if(li>=1){ this.silenceTimer=0; if(this.gardenState===GS.SLEEPING||this.gardenState===GS.FADING){ this.gardenState=GS.WAKING; this.stateT=0; } }
    else { this.silenceTimer+=dt; }
    this.stateT+=dt;
    switch(this.gardenState){
      case GS.WAKING: this.wake=smooth(this.wake,1,3,dt); if(this.stateT>2){ this.gardenState=GS.AWAKE; } Audio.setMusicMode('day'); break;
      case GS.AWAKE:  this.wake=smooth(this.wake,1,4,dt); if(this.silenceTimer>10){ this.gardenState=GS.FADING; this.stateT=0; } break;
      case GS.FADING: this.wake=smooth(this.wake,0,1.2,dt); if(this.stateT>3||this.wake<0.02){ this.gardenState=GS.SLEEPING; } Audio.setMusicMode('night'); break;
      case GS.SLEEPING:this.wake=smooth(this.wake,0,2,dt); Audio.setMusicMode('night'); break;
    }
    Audio.setMusicVol(0.5); Audio.setRiver(this.wake* norm);

    // effective loudness that also respects wake (garden asleep = no bloom even if noise starts)
    const eff = norm * clamp(this.wake*1.4,0,1);

    // --- flowers ---
    const swayAmp=0.3+eff*0.9;
    for(const f of this.flowers){
      const before=f.isBloom();
      f.update(dt, eff*rand(0.92,1.0)/1.0 + 0, swayAmp);
      // per-flower we want a stable target; recompute cleanly:
      f.target = eff*3; f.stageF = smooth(f.stageF, f.target, f.stageF<f.target?5:2.2, dt);
      const after=f.isBloom();
      if(after && !before){ this.onBloom(f); }
    }

    // --- butterflies: count proportional to loudness (TALK~12, SING~30+), spawn from bloomed flowers ---
    // eff at TALK ≈ 0.64 -> ~13, at SING ≈ 1.0 -> ~32
    const targetB = Math.round(eff*eff*32);
    if(this.butterflies.length<targetB && Math.random()<0.5){
      const src=pick(this.flowers.filter(f=>f.isBloom()));
      if(src) this.butterflies.push(new Butterfly(src.x, src.y-60));
    }
    for(let i=this.butterflies.length-1;i>=0;i--){ const b=this.butterflies[i]; b.update(dt); if(!b.grabbed && b.life<=0) this.butterflies.splice(i,1); }
    if(this.butterflies.length>targetB+5 && Math.random()<0.5){
      // never cull the butterfly the child is holding
      const idx=this.butterflies.findIndex(b=>!b.grabbed); if(idx>=0) this.butterflies.splice(idx,1);
    }

    // --- clouds (ambient) ---
    for(const c of this.clouds) c.update(dt);

    // --- pollen (density scales with loudness) ---
    if(Math.random()< 0.2+eff*0.8){
      this.pollen.spawn({ x:rand(0,STAGE_W), y:rand(STAGE_H*0.4,STAGE_H), vx:rand(-10,10), vy:rand(-24,-6), g:2,
        life:rand(3,6), r:rand(2,5), hue: this.wake>0.5?'#fff2b0':'#cfe0ff' });
    }
    this.pollen.update(dt);
    this.confetti.update(dt); this.water.update(dt);
    for(const p of this.water.pool){ if(p.active&&p.y>STAGE_H*0.9){p.active=false;} }

    // --- rainbow at SING ---
    const wantRainbow = li>=3 ? 1 : 0;
    if(wantRainbow && this.rainbow<0.02) Audio.rainbowMagic();
    this.rainbow=smooth(this.rainbow, wantRainbow, wantRainbow?2:0.8, dt);

    // --- scream handling ---
    if(this.screamCooldown>0) this.screamCooldown-=dt;
    if(li>=4 && this.screamCooldown<=0){ this.triggerScream(); this.screamCooldown=3; }
    if(this.screamPhase>0){ this.screamPhase-=dt; }

    // --- golden surprise ---
    this.goldenTimer-=dt;
    if(this.goldenTimer<=0){ this.goldenTimer=60; if(Math.random()<0.10) this.triggerGolden(); }
    if(this.goldenActive>0){ this.goldenActive-=dt; }

    // --- multi-interaction hold timers ---
    if(this.shakeCd>0) this.shakeCd-=dt;
    if(this.shakeWave>0) this.shakeWave-=dt*1.2;
    if(this.poppuWaveCd>0) this.poppuWaveCd-=dt;
    if(this.poppuWave>0) this.poppuWave-=dt*1.5;
    const pr=this.press;
    if(pr && !pr.moved){
      const held=this.time-pr.t0;
      // long-press a butterfly (300ms) -> it attaches to the finger
      if(!pr.grabbed && pr.bfly && this.butterflies.indexOf(pr.bfly)>=0 && held>0.3){
        pr.grabbed=true; pr.bfly.grabbed=true; Audio.grabChime(); Audio.startDragChime();
      }
      // long-press Poppu (3s) -> parent dashboard
      if(!pr.consumed && pr.onPoppu && !pr.grabbed && held>=3){ pr.consumed=true; this.openParent(); }
    }

    // --- poppu pose ---
    let pose='sleep';
    if(this.screamPhase>0) pose='ears-covered';
    else if(li>=3) pose='excited';
    else if(li>=2) pose='water';
    else if(this.wake>0.3) pose='water';
    else pose='sleep';
    // first-bloom celebration keeps Poppu jumping with joy for a beat
    if(this.poppuForceT>0){ this.poppuForceT-=dt; pose='excited'; }
    if(pose!==this.poppuPose){ this.poppuPose=pose; this.poppuBounce=1; if(pose==='water')Audio.splash(); }
    this.poppuBounce=Math.max(0,this.poppuBounce-dt*2.5);
    // idle life: schedule the next blink (whole-face squash) every 3-4s
    this.poppuBlinkT-=dt;
    if(this.poppuBlinkT<=0){ this.poppuBlinkT=rand(3,4); this.poppuBlinkDur=0.15; }
    if(this.poppuBlinkDur>0) this.poppuBlinkDur-=dt;

    // birds occasionally when awake
    if(this.wake>0.6 && Math.random()<dt*0.5) Audio.birds();

    // playtime tracking for the parent dashboard (flush to storage every ~5s)
    this._playAccum=(this._playAccum||0)+dt;
    if(this._playAccum>=5){ Save.rollPeriods(); Save.data.playSecToday+=this._playAccum; this._playAccum=0; Save.save(); }

    // toast timer
    if(this.ui.toastT>0){ this.ui.toastT-=dt; if(this.ui.toastT<=0) this.ui.toast=null; }
    this.ui.stickerPop=Math.max(0,this.ui.stickerPop-dt*1.5);
    this.ui.sceneMenuPulse+=dt;

    // onboarding hint auto-dismiss + first-bloom celebration timers
    if(this.showHint){ this.hintT-=dt; if(this.hintT<=0) this.dismissHint(); }
    if(this.celebrateT>0){
      this.celebrateT-=dt;
      // extra sparkles around the first flower while the banner is up
      if(this.celebrateFlower && Math.random()<0.5){
        this.pollen.spawn({ x:this.celebrateFlower.x+rand(-40,40), y:this.celebrateFlower.y-60+rand(-40,20),
          vx:rand(-24,24), vy:rand(-50,-10), g:2, life:rand(1,2), r:rand(2,5), hue:'#fff2b0' });
      }
      if(this.celebrateT<=0) this.celebrateFlower=null;
    }
  },

  onBloom(f){
    if(!this.bloomedThisSession.has(f)){
      this.bloomedThisSession.add(f);
      Audio.bloomChime();
      this.dismissHint();
      // the very first flower ever gets a big celebration moment
      if(!Save.data.celebratedFirst){ Save.data.celebratedFirst=true; this.firstBloomCelebrate(f); }
      // discovery / progression
      Save.data.bloomedTotal++;
      Save.rollPeriods(); Save.data.weekFlowers++;
      if(Save.data.discoveredFlowers.indexOf(f.type)<0){ Save.data.discoveredFlowers.push(f.type); }
      // sticker every 3 blooms
      if(this.bloomedThisSession.size % 3 === 0){ Save.data.stickers++; this.ui.stickerPop=1; this.toast('⭐ New sticker!'); }
      // scene unlocks
      this.checkUnlocks();
      Save.save();
    }
  },
  checkUnlocks(){
    const total=Save.data.bloomedTotal;
    if(!Save.data.unlocked.forest && total>=SCENES.forest.unlockAt){ Save.data.unlocked.forest=true; this.toast('🍄 Secret Forest unlocked!'); }
    if(!Save.data.unlocked.ocean && total>=SCENES.ocean.unlockAt){ Save.data.unlocked.ocean=true; this.toast('🐚 Ocean Cove unlocked!'); }
  },
  toast(msg){ this.ui.toast=msg; this.ui.toastT=3.2; },

  firstBloomCelebrate(f){
    this.celebrateT=2.4; this.celebrateFlower=f;
    this.poppuForceT=2;          // Poppu excited-jumps for 2s
    this.poppuBounce=1;
    f.pop=1;
    Audio.bloomChime(); Audio.golden();   // ascending chime + a little magic sparkle
    // big colorful confetti burst centered on the first flower
    for(let i=0;i<60;i++){
      this.confetti.spawn({ x:f.x+rand(-80,80), y:f.y-80, vx:rand(-160,160), vy:rand(-260,-60), g:260,
        life:rand(1.6,3), r:rand(4,9), rot:rand(0,TAU), vr:rand(-6,6),
        hue:pick(['#ff9ecf','#ffe08a','#9ee0b0','#a8c8ff','#ffb08a','#c9a8f0']) });
    }
  },

  triggerScream(){
    this.screamPhase=1.4; Audio.sparkle();
    // all flowers close then burst
    for(const f of this.flowers){ f.stageF=0.2; f.pop=0; }
    setTimeout(()=>{ for(const f of this.flowers){ f.pop=1; } Audio.golden(); }, 500);
  },
  triggerGolden(){
    this.goldenActive=4; Audio.golden();
    const f=pick(this.flowers); if(f){ f.golden=true; f.pop=1; setTimeout(()=>f.golden=false,4000); }
    Save.data.goldenFound++;
    for(let i=0;i<80;i++){ this.confetti.spawn({ x:STAGE_W/2+rand(-200,200), y:STAGE_H*0.3, vx:rand(-120,120), vy:rand(-200,-40), g:260,
      life:rand(2,3.5), r:rand(4,9), rot:rand(0,TAU), vr:rand(-6,6), hue:pick(['#ff9ecf','#ffe08a','#9ee0b0','#a8c8ff','#ffb08a']) }); }
    this.toast('✨ Golden surprise!');
  },

  /* ---------------- render ---------------- */
  render(dt){
    const g=this.g; g.setTransform(this.dpr,0,0,this.dpr,0,0);
    g.clearRect(0,0,this.canvas.width,this.canvas.height);
    g.save(); g.translate(this.ox,this.oy); g.scale(this.scale,this.scale);
    // clip to stage
    g.beginPath(); g.rect(0,0,STAGE_W,STAGE_H); g.clip();

    if(this.mode==='start') this.renderStart(g);
    else if(this.mode==='playing') this.renderGarden(g,dt);

    g.restore();
  },

  renderGarden(g,dt){
    const sc=SCENES[this.sceneKey]; const wake=this.wake;
    // background image
    const bg=Assets.get(sc.bg);
    if(bg) g.drawImage(bg,0,0,STAGE_W,STAGE_H);
    // night veil over background when asleep
    if(wake<1){ g.save(); g.globalAlpha=(1-wake)*0.72; g.fillStyle='#1a2540'; g.fillRect(0,0,STAGE_W,STAGE_H);
      // stars
      g.globalAlpha=(1-wake)*0.9; g.fillStyle='#fff8d0';
      for(let i=0;i<40;i++){ const x=(i*137.5)%STAGE_W, y=(i*89.3)%(STAGE_H*0.5); const tw=0.5+0.5*Math.sin(this.time*2+i); g.globalAlpha=(1-wake)*tw*0.8; g.fillRect(x,y,3,3); }
      g.restore();
    }
    // sunrise glow while waking
    if(this.gardenState===GS.WAKING){ const gr=g.createRadialGradient(STAGE_W*0.5,STAGE_H*0.7,50, STAGE_W*0.5,STAGE_H*0.7,STAGE_W*0.8);
      gr.addColorStop(0,`rgba(255,220,140,${0.4*wake})`); gr.addColorStop(1,'rgba(255,220,140,0)'); g.fillStyle=gr; g.fillRect(0,0,STAGE_W,STAGE_H); }

    // sun / sleepy sun — ONLY for placeholder bg (real backgrounds already paint a sun)
    if(!Assets.isReal(sc.bg)){
      const sun=Assets.get(wake>0.5?'sun-awake':'sun-sleepy');
      if(sun){ g.save(); const sy=lerp(STAGE_H*0.24, STAGE_H*0.14, wake); g.globalAlpha=0.9; g.translate(STAGE_W*0.82, sy); const s=0.9; g.scale(s,s); g.drawImage(sun,-sun.width/2,-sun.height/2); g.restore(); }
    }

    // clouds (ambient drift over every scene)
    for(const c of this.clouds) c.draw(g, lerp(0.4,0.85,wake));

    // tree — ONLY for placeholder bg (real backgrounds already paint trees/mushrooms)
    if(sc.hasTree && !Assets.isReal(sc.bg)){ const tr=Assets.get(this.sceneKey==='forest'?'mushroom-glow':'tree-oak');
      if(tr){ const s=this.sceneKey==='forest'?1.4:1.5; g.save(); g.translate(STAGE_W*0.14, STAGE_H*0.80); g.scale(s,s); g.drawImage(tr,-tr.width/2,-tr.height); g.restore(); } }

    // decorative static objects (rocks / mushrooms / shells / starfish) — sit on the ground behind flowers
    if(this.decor){ for(const d of this.decor){ const im=Assets.get(d.key); if(!im) continue;
      g.save(); g.globalAlpha=lerp(0.55,1,wake); g.translate(d.x,d.y); g.scale(d.s,d.s); g.drawImage(im,-im.width/2,-im.height); g.restore(); } }

    // rainbow
    if(this.rainbow>0.02){ const rb=Assets.get('rainbow-arc'); if(rb){ g.save(); g.globalAlpha=this.rainbow*0.9;
      const w=STAGE_W*0.7, h=w*(rb.height/rb.width); g.drawImage(rb, STAGE_W*0.15, STAGE_H*0.18, w, h); g.restore(); } }

    // pollen (behind flowers, soft)
    this.drawParticles(g,this.pollen,0.6);

    // flowers (back to front already sorted; re-sort cheaply not needed)
    const swayAmp=0.3+Audio.norm();
    for(const f of this.flowers) f.draw(g, swayAmp);

    // butterflies
    for(const b of this.butterflies) b.draw(g);

    // grass wave (foreground, procedural blades over ground)
    this.drawGrass(g, Audio.norm(), wake);

    // river flow (bottom) for scenes with pond/water
    this.drawRiver(g, Audio.norm(), wake);

    // confetti + golden glow
    if(this.goldenActive>0){ g.save(); g.globalAlpha=clamp(this.goldenActive/4,0,1)*0.3; g.fillStyle='#fff2b0'; g.fillRect(0,0,STAGE_W,STAGE_H); g.restore(); }
    // shake-to-pollinate golden sparkle wave
    if(this.shakeWave>0){ const p=1-clamp(this.shakeWave,0,1); g.save(); g.globalAlpha=clamp(this.shakeWave,0,1)*0.5;
      g.strokeStyle='#ffe89a'; g.lineWidth=48*clamp(this.shakeWave,0,1); g.beginPath();
      g.arc(STAGE_W/2, STAGE_H*0.6, lerp(80,STAGE_W*0.72,p), 0, TAU); g.stroke(); g.restore(); }
    this.drawParticles(g,this.confetti,1,true);

    // poppu
    this.drawPoppu(g, wake);

    // scream flash
    if(this.screamPhase>1.2){ g.save(); g.globalAlpha=(this.screamPhase-1.2)/0.2*0.5; g.fillStyle='#fff'; g.fillRect(0,0,STAGE_W,STAGE_H); g.restore(); }

    // first-bloom celebration + onboarding hint (above the HUD)
    this.renderCelebrate(g);
    this.renderHint(g);

    // UI
    this.renderHUD(g);
    if(this.ui.showBook) this.renderStickerBook(g);
    if(this.ui.showParent) this.renderParent(g);
  },

  renderHint(g){
    if(!this.showHint) return;
    const pulse=1+Math.sin(this.time*3)*0.06;
    g.save(); g.globalAlpha=clamp(this.hintT,0,1); g.translate(STAGE_W/2, STAGE_H*0.30); g.scale(pulse,pulse);
    const txt='Make a sound! 🎤';
    g.font='bold 56px "Baloo 2",sans-serif'; g.textAlign='center'; g.textBaseline='middle';
    const tw=g.measureText(txt).width, pw=tw+90, ph=118;
    g.shadowColor='rgba(90,70,40,0.25)'; g.shadowBlur=22; g.shadowOffsetY=8;
    this.rr(g,-pw/2,-ph/2,pw,ph,ph/2); g.fillStyle='rgba(255,255,255,0.96)'; g.fill();
    // little speech-bubble tail
    g.beginPath(); g.moveTo(-26,ph/2-10); g.lineTo(0,ph/2+34); g.lineTo(26,ph/2-10); g.closePath(); g.fill();
    g.shadowColor='transparent'; g.shadowBlur=0; g.shadowOffsetY=0;
    g.fillStyle='#e8792a'; g.fillText(txt,0,2);
    g.restore();
  },
  renderCelebrate(g){
    if(this.celebrateT<=0) return;
    const life=this.celebrateT, p=clamp((2.4-life)/0.4,0,1), sc=0.4+easeOut(p)*0.6;
    const txt='Your first flower! 🌸';
    g.save(); g.globalAlpha=clamp(life,0,1); g.translate(STAGE_W/2, STAGE_H*0.26); g.scale(sc,sc);
    g.font='bold 74px "Baloo 2",sans-serif'; g.textAlign='center'; g.textBaseline='middle';
    g.lineWidth=14; g.strokeStyle='#fff'; g.lineJoin='round'; g.strokeText(txt,0,0);
    g.shadowColor='rgba(255,255,255,0.6)'; g.shadowBlur=6;
    g.fillStyle='#f06aa0'; g.fillText(txt,0,0);
    g.restore();
  },

  drawParticles(g,sys,alpha,square){
    for(const p of sys.pool){ if(!p.active)continue; const a=clamp(p.life,0,1)*alpha; g.globalAlpha=a;
      g.fillStyle=p.hue||'#fff2b0';
      if(square){ g.save(); g.translate(p.x,p.y); g.rotate(p.rot||0); g.fillRect(-p.r,-p.r*0.6,p.r*2,p.r*1.2); g.restore(); }
      else { g.beginPath(); g.arc(p.x,p.y,p.r,0,TAU); g.fill(); }
    }
    g.globalAlpha=1;
  },
  drawGrass(g, norm, wake){
    const baseY=STAGE_H*0.86, tint= wake>0.5?'#6fbf5a':'#3f6a48';
    g.save(); g.strokeStyle=tint; g.lineWidth=6; g.lineCap='round';
    for(let i=0;i<70;i++){ const x=(i/70)*STAGE_W + 12; const h=40+((i*53)%40); const ph=this.time*2 + i*0.5;
      const sway=Math.sin(ph)*(6+norm*26); g.globalAlpha=0.85;
      g.beginPath(); g.moveTo(x, baseY+40); g.quadraticCurveTo(x+sway*0.5, baseY+40-h*0.6, x+sway, baseY+40-h); g.stroke(); }
    g.restore(); g.globalAlpha=1;
  },
  drawRiver(g, norm, wake){
    if(!SCENES[this.sceneKey].hasPond && this.sceneKey!=='ocean') return;
    const y=STAGE_H*0.965, h=STAGE_H*0.05;
    g.save(); g.globalAlpha=0.5*wake+0.2; g.fillStyle= this.sceneKey==='ocean'?'#7fd6da':'#8fc8e8';
    g.fillRect(0,y-h,STAGE_W,h*2);
    g.globalAlpha=0.6; g.strokeStyle='rgba(255,255,255,0.7)'; g.lineWidth=3;
    for(let i=0;i<20;i++){ const x=((this.time*(40+norm*160)+i*120)%(STAGE_W+120))-60; g.beginPath(); g.arc(x, y+Math.sin(i)*6, 8,0,Math.PI); g.stroke(); }
    g.restore(); g.globalAlpha=1;
  },
  drawPoppu(g, wake){
    const img=Assets.get('poppu-'+this.poppuPose); if(!img)return;
    const bx=STAGE_W*0.12, by=STAGE_H*0.95; const bounce=Math.sin(this.poppuBounce*Math.PI)* (this.poppuPose==='excited'?40:12);
    const s=0.72;
    // gentle breathing (2s cycle, +2% scale) so Poppu never looks like a frozen sprite
    const breathe=1+(Math.sin(this.time*Math.PI)*0.5+0.5)*0.02;
    // occasional blink as a brief squash (can't edit baked eyes on a real sprite); skip mid-jump
    let blink=1;
    if(this.poppuBlinkDur>0 && this.poppuPose!=='excited'){ const p=1-(this.poppuBlinkDur/0.15); blink=1-Math.sin(clamp(p,0,1)*Math.PI)*0.14; }
    // wave wobble when Poppu is tapped (rock side-to-side)
    const waveRot=this.poppuWave>0 ? Math.sin(this.time*22)*0.12*clamp(this.poppuWave,0,1) : 0;
    g.save(); g.translate(bx, by-bounce);
    if(waveRot){ g.translate(0,-img.height*s*0.5); g.rotate(waveRot); g.translate(0,img.height*s*0.5); }
    g.scale(s*breathe, s*breathe*blink); g.drawImage(img,-img.width/2,-img.height); g.restore();
    // little waving-paw sparkles + "hi!" bubble
    if(this.poppuWave>0.2){ g.save(); g.globalAlpha=clamp(this.poppuWave,0,1);
      g.font='bold 44px "Baloo 2",sans-serif'; g.textAlign='center'; g.fillStyle='#fff';
      g.strokeStyle='rgba(90,70,40,0.5)'; g.lineWidth=6;
      g.strokeText('hi! 👋', bx+70, by-img.height*s-6); g.fillText('hi! 👋', bx+70, by-img.height*s-6); g.restore(); }
  },

  /* ---------------- HUD & menus ---------------- */
  renderHUD(g){
    // scene selector (top-right)
    const keys=SCENE_ORDER; this._sceneBtns=this._sceneBtns||{};
    keys.forEach((k,i)=>{
      const x=STAGE_W-100-(keys.length-1-i)*110, y=90;
      const unlocked=Save.data.unlocked[k]; const active=k===this.sceneKey;
      const img=Assets.get('ui-scene-btn-'+k);
      g.save(); g.translate(x,y); const pulse=active?1+Math.sin(this.time*3)*0.05:1; g.scale(0.8*pulse,0.8*pulse);
      // backing
      g.beginPath(); g.arc(0,0,72,0,TAU); g.fillStyle= active?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.55)'; g.fill();
      if(active){ g.lineWidth=6; g.strokeStyle='#ffd985'; g.stroke(); }
      if(img) g.drawImage(img,-img.width/2,-img.height/2);
      if(!unlocked){ const lk=Assets.get('ui-lock-icon'); if(lk){ g.globalAlpha=0.95; g.drawImage(lk,-lk.width/2,-lk.height/2+6); } }
      g.restore();
      this._sceneBtns[k]={x,y,r:60};
    });
    // sticker/book button (top-left)
    g.save(); g.translate(90,90); const fr=Assets.get('ui-sticker-frame');
    g.beginPath(); g.arc(0,0,60,0,TAU); g.fillStyle='rgba(255,255,255,0.7)'; g.fill();
    g.shadowColor='rgba(255,255,255,0.7)'; g.shadowBlur=4;
    g.font='bold 40px sans-serif'; g.textAlign='center'; g.textBaseline='middle'; g.fillStyle='#c98a2a'; g.fillText('⭐',0,-6);
    g.font='bold 26px "Baloo 2",sans-serif'; g.fillStyle='#6a5a3a'; g.fillText(Save.data.stickers, 0, 30*(1) );
    g.shadowBlur=0;
    const sp=this.ui.stickerPop; if(sp>0){ g.globalAlpha=sp; g.beginPath(); g.arc(0,0,60+ (1-sp)*40,0,TAU); g.strokeStyle='#ffd985'; g.lineWidth=5; g.stroke(); }
    g.restore();

    // streak (top-center small)
    if(Save.data.streak>0){ g.save(); g.translate(STAGE_W/2,60); g.font='bold 34px "Baloo 2",sans-serif'; g.textAlign='center';
      g.shadowColor='rgba(90,70,40,0.35)'; g.shadowBlur=8; g.shadowOffsetY=3;
      g.fillStyle='rgba(255,255,255,0.9)'; g.strokeStyle='rgba(120,90,40,0.6)'; g.lineWidth=6;
      g.strokeText('🔥 Day '+Save.data.streak,0,0); g.fillText('🔥 Day '+Save.data.streak,0,0); g.restore(); }

    // sound-level meter (bottom-right, gentle)
    this.drawMeter(g);

    // mic-denied gentle hint
    if(Audio.micDenied){ g.save(); g.globalAlpha=0.85; g.font='bold 30px "Baloo 2",sans-serif'; g.textAlign='center'; g.fillStyle='#fff';
      g.shadowColor='rgba(90,70,40,0.4)'; g.shadowBlur=8; g.shadowOffsetY=3;
      g.strokeStyle='rgba(90,70,40,0.6)'; g.lineWidth=5; const msg='🎤 Turn on the mic to sing to the garden!';
      g.strokeText(msg,STAGE_W/2,STAGE_H-40); g.fillText(msg,STAGE_W/2,STAGE_H-40); g.restore(); }

    // toast — rounded pill + soft shadow for a premium kawaii feel
    if(this.ui.toast){ const a=clamp(this.ui.toastT,0,1); g.save(); g.globalAlpha=a; g.translate(STAGE_W/2,STAGE_H*0.2);
      g.font='bold 48px "Baloo 2",sans-serif'; g.textAlign='center'; g.textBaseline='middle';
      const tw=g.measureText(this.ui.toast).width, pw=tw+90, ph=94;
      g.save(); g.shadowColor='rgba(90,70,40,0.28)'; g.shadowBlur=20; g.shadowOffsetY=7;
      this.rr(g,-pw/2,-ph/2,pw,ph,ph/2); g.fillStyle='rgba(255,255,255,0.96)'; g.fill(); g.restore();
      g.shadowColor='rgba(255,255,255,0.6)'; g.shadowBlur=4;
      g.fillStyle='#e8792a'; g.fillText(this.ui.toast,0,2); g.restore(); }
  },
  drawMeter(g){
    const x=STAGE_W-70, y=STAGE_H-70, h=180;
    g.save(); g.translate(x,y);
    const n=Audio.norm(); const cols=['#a8c8ff','#b8ecc4','#ffe38a','#ffcf9a','#f7a8c4'];
    g.globalAlpha=0.5; this.rr(g,-18,-h,36,h,18); g.fillStyle='rgba(255,255,255,0.4)'; g.fill();
    g.globalAlpha=0.95; const fh=h*n; this.rr(g,-18,-fh,36,fh,18); g.fillStyle=cols[Audio.levelIdx]; g.fill();
    g.restore(); g.globalAlpha=1;
  },
  rr(g,x,y,w,h,r){ r=Math.min(r,h/2,w/2); g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); },

  renderStickerBook(g){
    g.save(); g.fillStyle='rgba(40,50,70,0.75)'; g.fillRect(0,0,STAGE_W,STAGE_H);
    const bw=STAGE_W*0.72, bh=STAGE_H*0.72, bx=(STAGE_W-bw)/2, by=(STAGE_H-bh)/2;
    this.rr(g,bx,by,bw,bh,50); g.fillStyle='#fff8ec'; g.fill(); g.lineWidth=14; g.strokeStyle='#ffd985'; g.stroke();
    g.fillStyle='#6a5a3a'; g.font='bold 60px "Baloo 2",sans-serif'; g.textAlign='center'; g.fillText('My Garden Book', STAGE_W/2, by+80);
    // discovered flowers grid
    const types=Object.keys(FLOWERS); const cols=4, cw=bw/cols;
    types.forEach((t,i)=>{ const cx=bx+ (i%cols)*cw + cw/2; const cy=by+180+ ((i/cols)|0)*180;
      const found=Save.data.discoveredFlowers.indexOf(t)>=0;
      const img=Assets.get(t+'-bloom');
      g.save(); g.translate(cx,cy); if(!found){ g.globalAlpha=0.25; g.filter='grayscale(1)'; }
      if(img){ const s=0.55; g.drawImage(img,-img.width*s/2,-img.height*s/2, img.width*s, img.height*s); } g.restore();
      if(!found){ g.fillStyle='#c9b8a0'; g.font='bold 44px sans-serif'; g.fillText('?',cx,cy); }
    });
    g.font='bold 34px "Baloo 2",sans-serif'; g.fillStyle='#8a7a5a'; g.fillText('Tap anywhere to close', STAGE_W/2, by+bh-40);
    g.restore();
  },

  renderParent(g){
    g.save();
    g.fillStyle='rgba(40,50,70,0.55)'; g.fillRect(0,0,STAGE_W,STAGE_H);
    const bw=STAGE_W*0.60, bh=STAGE_H*0.80, bx=(STAGE_W-bw)/2, by=(STAGE_H-bh)/2;
    this._parentCard={x:bx,y:by,w:bw,h:bh};
    // soft pastel card
    g.save(); g.shadowColor='rgba(40,50,70,0.35)'; g.shadowBlur=40; g.shadowOffsetY=12;
    this.rr(g,bx,by,bw,bh,44); const gr=g.createLinearGradient(0,by,0,by+bh);
    gr.addColorStop(0,'#fdf7ef'); gr.addColorStop(1,'#eef6ef'); g.fillStyle=gr; g.fill(); g.restore();
    g.lineWidth=8; g.strokeStyle='#cfe3d6'; this.rr(g,bx,by,bw,bh,44); g.stroke();
    // header
    g.textAlign='center'; g.textBaseline='middle';
    g.font='bold 46px "Baloo 2",sans-serif'; g.fillStyle='#6a7a62'; g.fillText('For Parents 👆', STAGE_W/2, by+58);
    g.font='600 24px "Baloo 2",sans-serif'; g.fillStyle='#9aa896'; g.fillText("A gentle peek at this week's play", STAGE_W/2, by+96);

    // stat tiles (2 columns)
    const mins=Math.max(0, Math.round(Save.data.playSecToday/60));
    const tiles=[
      ['🌸', Save.data.bloomedTotal, 'flowers grown'],
      ['⏱️', mins+(mins===1?' min':' mins'), 'played today'],
      ['🔥', 'Day '+Save.data.streak, 'streak'],
      ['🎮', Save.data.sessions, 'play sessions'],
      ['⭐', Save.data.stickers+'/40', 'stickers'],
      ['✨', Save.data.goldenFound, 'golden surprises'],
    ];
    const cols=2, tw=(bw-90)/cols, th=92, tx0=bx+30, ty0=by+130;
    tiles.forEach((t,i)=>{ const cx=tx0+(i%cols)*(tw+30), cy=ty0+((i/cols)|0)*(th+16);
      this.rr(g,cx,cy,tw,th,22); g.fillStyle='#ffffff'; g.fill(); g.lineWidth=3; g.strokeStyle='#e6efe6'; g.stroke();
      g.textAlign='left'; g.font='40px sans-serif'; g.fillText(t[0], cx+22, cy+th/2);
      g.font='bold 40px "Baloo 2",sans-serif'; g.fillStyle='#5f7256'; g.fillText(String(t[1]), cx+80, cy+th/2-12);
      g.font='600 22px "Baloo 2",sans-serif'; g.fillStyle='#9aa896'; g.fillText(t[2], cx+80, cy+th/2+22);
    });

    // scene progress
    let py=ty0+3*(th+16)+18;
    g.textAlign='center'; g.font='bold 26px "Baloo 2",sans-serif'; g.fillStyle='#7a8a72';
    const sceneLine='Backyard '+ (Save.data.unlocked.forest?'✓':'✓') +'   Forest '+(Save.data.unlocked.forest?'✓':'🔒')+'   Ocean '+(Save.data.unlocked.ocean?'✓':'🔒');
    g.fillText(sceneLine, STAGE_W/2, py);
    // weekly report line
    py+=44; g.font='600 24px "Baloo 2",sans-serif'; g.fillStyle='#8a9a82';
    g.fillText('🌱 This week: '+Save.data.weekFlowers+' flowers · '+Save.data.stickers+' ⭐ · '+Save.data.streak+'🔥', STAGE_W/2, py);

    // share button
    const sbw=340, sbh=70, sbx=STAGE_W/2-sbw/2, sby=by+bh-100;
    this._parentShare={x:sbx,y:sby,w:sbw,h:sbh};
    this.rr(g,sbx,sby,sbw,sbh,35); const sg=g.createLinearGradient(0,sby,0,sby+sbh);
    sg.addColorStop(0,'#bff0a8'); sg.addColorStop(1,'#8ed07a'); g.fillStyle=sg; g.fill();
    g.font='bold 30px "Baloo 2",sans-serif'; g.fillStyle='#3a5a2a'; g.textAlign='center';
    g.fillText('💚 Share our garden', STAGE_W/2, sby+sbh/2);

    // close X
    const cxp=bx+bw-46, cyp=by+46; this._parentClose={x:cxp,y:cyp};
    g.beginPath(); g.arc(cxp,cyp,26,0,TAU); g.fillStyle='#f0d8d8'; g.fill();
    g.strokeStyle='#c98a8a'; g.lineWidth=5; g.lineCap='round';
    g.beginPath(); g.moveTo(cxp-9,cyp-9); g.lineTo(cxp+9,cyp+9); g.moveTo(cxp+9,cyp-9); g.lineTo(cxp-9,cyp+9); g.stroke();
    g.restore();
  },

  /* ---------------- start screen ---------------- */
  renderStart(g){
    // painted twilight bg
    const bg=Assets.get('bg-backyard'); if(bg) g.drawImage(bg,0,0,STAGE_W,STAGE_H);
    // soft top-to-bottom vignette for title legibility (keeps the sunny scene bright)
    g.save(); const vg=g.createLinearGradient(0,0,0,STAGE_H);
    vg.addColorStop(0,'rgba(40,55,90,0.30)'); vg.addColorStop(0.4,'rgba(40,55,90,0.05)'); vg.addColorStop(1,'rgba(30,45,70,0.25)');
    g.fillStyle=vg; g.fillRect(0,0,STAGE_W,STAGE_H); g.restore();
    for(const c of this.clouds){ c.update(0.016); c.draw(g,0.85); }
    // poppu waving (behind logo, lower-right so nothing overlaps the title)
    const pp=Assets.get('poppu-excited'); if(pp){ const s=0.82+Math.sin(this.time*2)*0.02; g.save();
      g.translate(STAGE_W*0.80, STAGE_H*0.70); g.scale(s,s); g.drawImage(pp,-pp.width/2,-pp.height/2); g.restore(); }
    // logo — size by target HEIGHT (its wide aspect would otherwise dominate the screen)
    const logo=Assets.get('ui-logo'); if(logo){ const h=STAGE_H*0.34, w=h*(logo.width/logo.height);
      const bob=Math.sin(this.time*1.5)*8; g.drawImage(logo,(STAGE_W-w)/2, STAGE_H*0.07+bob, w, h); }
    // play button (pulsing) — clearly below the logo
    const pb=Assets.get('ui-play-btn'); const pulse=1+Math.sin(this.time*3)*0.05;
    if(pb){ const h=STAGE_H*0.20*pulse, w=h*(pb.width/pb.height); this._playRect={x:STAGE_W/2-w/2, y:STAGE_H*0.60-h/2, w, h};
      g.drawImage(pb, this._playRect.x, this._playRect.y, w, h); }
    // mic prompt line (below the button)
    g.save(); g.textAlign='center'; g.textBaseline='middle'; g.font='bold 40px "Baloo 2",sans-serif'; g.fillStyle='#fff';
    g.strokeStyle='rgba(60,50,30,0.55)'; g.lineWidth=7; const msg='🎤 Poppu needs to hear your voice!';
    g.strokeText(msg,STAGE_W/2,STAGE_H*0.80); g.fillText(msg,STAGE_W/2,STAGE_H*0.80); g.restore();
    // club banner (dismissible placeholder)
    this.drawClubBanner(g);
  },
  drawClubBanner(g){
    if(this._bannerDismissed) return;
    const bw=STAGE_W*0.5, bh=70, bx=(STAGE_W-bw)/2, by=STAGE_H-90;
    g.save(); g.globalAlpha=0.92; this.rr(g,bx,by,bw,bh,35); g.fillStyle='#ffe6b0'; g.fill(); g.lineWidth=4; g.strokeStyle='#e8b96a'; g.stroke();
    g.fillStyle='#8a6a2a'; g.font='bold 30px "Baloo 2",sans-serif'; g.textAlign='center'; g.textBaseline='middle';
    g.fillText('🌸 Join the Poppu Garden Club!', STAGE_W/2, by+bh/2);
    // x
    g.beginPath(); g.arc(bx+bw-30,by+bh/2,18,0,TAU); g.fillStyle='#e8b96a'; g.fill(); g.fillStyle='#fff'; g.font='bold 26px sans-serif'; g.fillText('×',bx+bw-30,by+bh/2);
    this._bannerRect={x:bx+bw-48,y:by,w:48,h:bh};
    g.restore();
  },

  /* ---------------- input handling ---------------- */
  async onPressDown(x,y){
    if(this.mode==='start'){
      // banner dismiss
      if(this._bannerRect && x>this._bannerRect.x && x<this._bannerRect.x+this._bannerRect.w && y>this._bannerRect.y && y<this._bannerRect.y+this._bannerRect.h){ this._bannerDismissed=true; return; }
      // play
      const r=this._playRect;
      if(r && x>r.x && x<r.x+r.w && y>r.y && y<r.y+r.h){
        if(this._micPending) return;    // guard against double-tap while the mic request is pending
        this._micPending=true;
        this.requestMotionPerm();        // ask motion (iOS) on the same user gesture
        await Audio.requestMic();        // ask mic on the user gesture
        this._micPending=false;
        this.startPlaying();
      }
      return;
    }
    if(this.mode!=='playing') return;
    // modals first
    if(this.ui.showParent){ this.parentTap(x,y); return; }
    if(this.ui.showBook){ this.ui.showBook=false; return; }
    // immediate UI buttons
    if(Math.hypot(x-90,y-90)<64){ this.ui.showBook=true; return; }
    for(const k of SCENE_ORDER){ const b=this._sceneBtns&&this._sceneBtns[k]; if(b && Math.hypot(x-b.x,y-b.y)<b.r){
      if(Save.data.unlocked[k]){ if(k!==this.sceneKey){ this.sceneKey=k; this.buildScene(k); this.bloomedThisSession=new Set(); } }
      else { this.toast('🔒 Bloom more flowers to unlock!'); }
      return; } }
    // otherwise begin a press we resolve on hold / release (butterfly grab, Poppu tap/long-press, flower tap)
    // Poppu wins its own corner so the parent long-press is never hijacked by a butterfly drifting over it
    const onPoppu=this.hitPoppu(x,y);
    this.press={ x0:x, y0:y, t0:this.time, moved:false, bfly:onPoppu?null:this.findButterfly(x,y), onPoppu, grabbed:false, consumed:false };
  },
  onPressMove(x,y){
    const pr=this.press; if(!pr) return;
    if(Math.hypot(x-pr.x0,y-pr.y0)>24) pr.moved=true;
    if(pr.grabbed && pr.bfly){ pr.bfly.x=x; pr.bfly.y=y;
      if(Math.random()<0.6) this.pollen.spawn({ x:x+rand(-10,10), y:y+rand(-6,14), vx:rand(-20,20), vy:rand(-30,-4), g:1, life:rand(0.5,1.1), r:rand(2,4), hue:'#fff2b0' });
    }
  },
  onPressUp(x,y){
    const pr=this.press; this.press=null; if(!pr) return;
    if(pr.grabbed && pr.bfly){ this.releaseButterfly(pr.bfly); return; }
    if(pr.consumed) return;               // long-press already opened the parent dashboard
    if(pr.moved) return;                  // a drag that never grabbed anything
    if(pr.onPoppu){ this.wavePoppu(); return; }
    this.tapFlower(x,y);
  },

  findButterfly(x,y){ let best=null,bd=1e9; for(const b of this.butterflies){ const d=Math.hypot(x-b.x,y-b.y); const r=60*b.scale+34; if(d<r && d<bd){bd=d;best=b;} } return best; },
  hitPoppu(x,y){ const bx=STAGE_W*0.12, by=STAGE_H*0.95; return x>bx-190 && x<bx+190 && y>by-360 && y<by+24; },

  tapFlower(x,y){
    let best=null,bd=90; for(const f of this.flowers){ const d=Math.hypot(x-f.x,y-(f.y-60)); if(d<bd){bd=d;best=f;} }
    if(best && best.tapCd<=0){
      best.tapCd=0.5; best.pop=1; best.wiggle=1; Audio.sparkleVary();
      const F=FLOWERS[best.type]||{color:'#ffd985'};
      for(let i=0;i<10;i++){ this.confetti.spawn({ x:best.x+rand(-22,22), y:best.y-60+rand(-24,10), vx:rand(-90,90), vy:rand(-150,-40),
        g:220, life:rand(0.8,1.6), r:rand(3,6), rot:rand(0,TAU), vr:rand(-8,8), hue: (i%2)?F.color:'#fff2b0' }); }
      for(let i=0;i<6;i++){ this.pollen.spawn({ x:best.x+rand(-16,16), y:best.y-60, vx:rand(-34,34), vy:rand(-56,-12),
        g:2, life:rand(1,2), r:rand(2,4), hue:'#fff2b0' }); }
    }
  },
  releaseButterfly(b){
    b.grabbed=false; b.life=Math.max(b.life,rand(6,12)); b.vx=rand(-50,50); b.vy=rand(-60,-20);
    Audio.stopDragChime(); Audio.sparkleVary();
    for(let i=0;i<16;i++) this.confetti.spawn({ x:b.x+rand(-14,14), y:b.y+rand(-14,14), vx:rand(-120,120), vy:rand(-160,-30),
      g:200, life:rand(0.8,1.6), r:rand(3,6), rot:rand(0,TAU), vr:rand(-8,8), hue:pick(['#fff2b0','#ffd0e8','#bfe6ff', BFLY_TINT[b.type]||'#ffd766']) });
    for(let i=0;i<8;i++) this.pollen.spawn({ x:b.x+rand(-10,10), y:b.y, vx:rand(-40,40), vy:rand(-60,-10), g:2, life:rand(1,2), r:rand(2,4), hue:'#fff2b0' });
  },
  wavePoppu(){
    if(this.poppuWaveCd>0) return;
    this.poppuWaveCd=3; this.poppuForceT=Math.max(this.poppuForceT,1.0); this.poppuBounce=1; this.poppuWave=1;
    Audio.chirp();
    const bx=STAGE_W*0.12, by=STAGE_H*0.62;
    for(let i=0;i<14;i++) this.confetti.spawn({ x:bx+rand(-50,50), y:by+rand(-60,40), vx:rand(-120,120), vy:rand(-180,-40),
      g:220, life:rand(1,1.8), r:rand(3,7), rot:rand(0,TAU), vr:rand(-8,8), hue:pick(['#ff9ecf','#ffe08a','#9ee0b0','#a8c8ff']) });
  },
  triggerShake(){
    Audio.shakeChime();
    const blooms=this.flowers.filter(f=>f.isBloom());
    for(const f of blooms){ f.pop=1; for(let i=0;i<4;i++) this.pollen.spawn({ x:f.x+rand(-20,20), y:f.y-60, vx:rand(-60,60), vy:rand(-90,-20), g:2, life:rand(1.2,2.4), r:rand(2,5), hue:'#ffe89a' }); }
    for(let i=0;i<30;i++) this.pollen.spawn({ x:rand(0,STAGE_W), y:rand(STAGE_H*0.5,STAGE_H*0.9), vx:rand(-50,50), vy:rand(-100,-20), g:2, life:rand(1,2.5), r:rand(2,5), hue:'#fff2b0' });
    this.shakeWave=1;
    const cx=STAGE_W/2, cy=STAGE_H*0.6;
    for(const b of this.butterflies){ if(b.grabbed) continue; const ang=Math.atan2(cy-b.y,cx-b.x); b.vx=lerp(b.vx,Math.cos(ang)*60,0.7); b.vy=lerp(b.vy,Math.sin(ang)*60,0.7); }
    if(blooms.length){ for(let i=0;i<6;i++){ const s=pick(blooms); this.butterflies.push(new Butterfly(s.x,s.y-50)); } }
    this.toast('✨ Shake magic!');
  },

  /* ---------------- parent dashboard ---------------- */
  openParent(){ this.ui.showParent=true; this.press=null; Audio.chirp(); },
  parentTap(x,y){
    // X button or share button hit-tests set in renderParent
    if(this._parentClose && Math.hypot(x-this._parentClose.x,y-this._parentClose.y)<44){ this.ui.showParent=false; return; }
    const sb=this._parentShare;
    if(sb && x>sb.x && x<sb.x+sb.w && y>sb.y && y<sb.y+sb.h){ this.shareReport(); return; }
    // tap outside the card closes
    const cp=this._parentCard;
    if(cp && (x<cp.x||x>cp.x+cp.w||y<cp.y||y>cp.y+cp.h)){ this.ui.showParent=false; }
  },
  shareReport(){
    const name='Your little one';
    const txt='🌸 '+name+' grew '+Save.data.bloomedTotal+' flowers in Poppu Garden this week!';
    try{
      if(navigator.share){ navigator.share({ text:txt }).catch(()=>{}); }
      else if(navigator.clipboard){ navigator.clipboard.writeText(txt).catch(()=>{}); this.toast('📋 Report copied!'); }
      else this.toast('🌸 '+Save.data.bloomedTotal+' flowers!');
    }catch(e){ this.toast('🌸 '+Save.data.bloomedTotal+' flowers!'); }
  },
};

/* boot */
window.addEventListener('load', ()=> Game.boot());
/* PWA service worker — only over http(s) so file:// runs stay error-free */
if('serviceWorker' in navigator && (location.protocol==='https:'||location.protocol==='http:')){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
</body>
